<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VeloceShare</title>

<script src="https://cdn.jsdelivr.net/npm/simple-peer@9/simplepeer.min.js"></script>

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:system-ui;
background:#020617;
color:white;
}

body.light{
background:#f1f5f9;
color:#020617;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:#0f172a;
padding:20px;
border-radius:16px;
margin-top:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

h2{margin-top:0;}

.logo{
width:110px;
display:block;
margin:auto;
margin-bottom:10px;
}

/* buttons */
button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:12px;
background:#22c55e;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

/* inputs */
textarea,input,select{
width:100%;
padding:10px;
margin-top:10px;
border-radius:10px;
border:none;
background:#020617;
color:white;
}

/* layout */
.row{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

@media(max-width:700px){
.row{grid-template-columns:1fr;}
}

/* video */
video{
width:100%;
border-radius:12px;
margin-top:10px;
background:black;
}

/* chat */
#chatBox{
height:150px;
overflow:auto;
background:#020617;
padding:10px;
border-radius:10px;
}

/* nav */
.nav{
display:flex;
gap:10px;
margin-top:10px;
}

/* plans */
.pricingGrid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
}
.priceCard{
background:#020617;
padding:20px;
border-radius:12px;
text-align:center;
}
.price{color:#22c55e;font-size:24px;}
</style>

</head>

<body>

<!-- LOGIN -->

<div id="loginPage" class="container">
<div class="card">
<img src="veloce-logo.png" class="logo">
<h2>Login</h2>
<input id="codeInput" placeholder="Access Code">
<button onclick="login()">Enter</button>
<div id="loginError"></div>
</div>
</div>

<!-- APP -->

<div id="app" style="display:none;" class="container">

<img src="veloce-logo.png" class="logo">

<div class="nav">
<button onclick="showPage('home')">Home</button>
<button onclick="showPage('plans')">Plans</button>
<button onclick="showPage('settings')">Settings</button>
</div>

<!-- HOME -->

<div id="homePage">

<div class="card">
<h2>Stream Controls</h2>

<select id="qualitySelect">
<option value="low">Low (480p)</option>
<option value="medium">Medium (720p)</option>
<option value="high">High (1080p)</option>
</select>

<button onclick="startStream()">Start Screen Share</button> <button onclick="goFullscreen()">Fullscreen</button>

</div>

<div class="card">
<h2>Room Connection</h2>

<div class="row">

<!-- HOST -->

<div>
<h3>Host</h3>
<button onclick="createRoom()">Create Room</button>

<label>Host Code (send to user)</label>

<textarea id="hostCodeBox"></textarea>

<label>Paste User Code</label>

<textarea id="userCodeBox"></textarea>

<button onclick="connectUser()">Connect User</button>

</div>

<!-- JOIN -->

<div>
<h3>Join</h3>

<label>Paste Host Code</label>

<textarea id="joinCodeBox"></textarea>

<button onclick="joinRoom()">Join Room</button>

<label>Your Response Code</label>

<textarea id="responseCodeBox"></textarea>

</div>

</div>

<div id="status">Waiting...</div>
</div>

<div class="card">
<h2>Live Screen</h2>
<video id="video" autoplay playsinline></video>
</div>

<div class="card">
<h2>Chat</h2>
<div id="chatBox"></div>
<input id="chatInput" placeholder="Type message">
<button onclick="sendMessage()">Send</button>
</div>

</div>

<!-- PLANS -->

<div id="plansPage" style="display:none;">
<div class="card">
<h2>Plans</h2>
<div class="pricingGrid">
<div class="priceCard"><h3>Basic</h3><div class="price">$5.99</div></div>
<div class="priceCard"><h3>Pro</h3><div class="price">$11.99</div></div>
<div class="priceCard"><h3>Ultra</h3><div class="price">$25.99</div></div>
</div>
</div>
</div>

<!-- SETTINGS -->

<div id="settingsPage" style="display:none;">
<div class="card">
<h2>Settings</h2>

<button onclick="toggleTheme()">Toggle Theme</button>

<h3>RGB Background</h3>
<div class="row">
<input id="r" placeholder="R">
<input id="g" placeholder="G">
<input id="b" placeholder="B">
</div>
<button onclick="setRGB()">Apply</button>

</div>
</div>

</div>

<script>

/* LOGIN */
function login(){
if(codeInput.value==="1111"){
loginPage.style.display="none";
app.style.display="block";
}else{
loginError.innerText="Wrong code";
}
}

/* NAV */
function showPage(p){
homePage.style.display="none";
plansPage.style.display="none";
settingsPage.style.display="none";

if(p==="home") homePage.style.display="block";
if(p==="plans") plansPage.style.display="block";
if(p==="settings") settingsPage.style.display="block";
}

/* STREAM */
let stream;
async function startStream(){
let q=qualitySelect.value;

let constraints={
video:{
width:q==="low"?640:q==="medium"?1280:1920,
height:q==="low"?480:q==="medium"?720:1080,
frameRate:q==="low"?15:30
}
};

stream=await navigator.mediaDevices.getDisplayMedia(constraints);
video.srcObject=stream;
status.innerText="Streaming ("+q+")";
}

/* FULLSCREEN */
function goFullscreen(){
video.requestFullscreen();
}

/* WEBRTC */
let peers=[];
let peer=null;

function createRoom(){
const p=new SimplePeer({
initiator:true,
trickle:false,
stream:stream,
config:{iceServers:[
{urls:"stun:stun.l.google.com:19302"},
{urls:"stun:global.stun.twilio.com:3478"}
]}
});

p.on("signal",d=>{
hostCodeBox.value="$"+btoa(JSON.stringify(d));
});

p.on("data",d=>{
addMessage("User: "+d);
peers.forEach(x=>{if(x!==p)x.send(d);});
});

p.on("stream",r=>{
video.srcObject=r;
});

peers.push(p);
}

function connectUser(){
let input=userCodeBox.value.trim();
if(input.startsWith("$")) input=input.slice(1);

const signal=JSON.parse(atob(input));
peers[peers.length-1].signal(signal);

createRoom();
}

function joinRoom(){
let input=joinCodeBox.value.trim();
if(input.startsWith("$")) input=input.slice(1);

const signal=JSON.parse(atob(input));

peer=new SimplePeer({
initiator:false,
trickle:false,
config:{iceServers:[
{urls:"stun:stun.l.google.com:19302"},
{urls:"stun:global.stun.twilio.com:3478"}
]}
});

peer.signal(signal);

peer.on("signal",d=>{
responseCodeBox.value="$"+btoa(JSON.stringify(d));
});

peer.on("data",d=>{
addMessage(d);
});

peer.on("stream",r=>{
video.srcObject=r;
});
}

/* CHAT */
function sendMessage(){
const msg=chatInput.value;
if(!msg) return;

addMessage("You: "+msg);

if(peer) peer.send(msg);
peers.forEach(p=>p.send(msg));

chatInput.value="";
}

function addMessage(msg){
const div=document.createElement("div");
div.textContent=msg;
chatBox.appendChild(div);
chatBox.scrollTop=chatBox.scrollHeight;
}

/* SETTINGS */
function toggleTheme(){
document.body.classList.toggle("light");
}

function setRGB(){
document.body.style.background=`rgb(${r.value||0},${g.value||0},${b.value||0})`;
}

</script>

</body>
</html>
